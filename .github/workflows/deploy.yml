name: Build & Deploy

# Builds a multi-arch (amd64 + arm64) image, pushes it to GHCR, then deploys to
# the Oracle instance over SSH. Secrets come from GitHub Secrets — never from
# the repo. Triggers on pushes that touch the app or deploy config.

on:
  push:
    branches: [main]
    paths:
      - 'hub/**'
      - 'deploy/**'
      - 'Dockerfile'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push (amd64 + arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/ai-demo:latest
            ghcr.io/${{ github.repository_owner }}/ai-demo:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Write env files from secrets
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          OPENAI_TEMPERATURE: ${{ secrets.OPENAI_TEMPERATURE }}
          OPENAI_MAX_TOKENS: ${{ secrets.OPENAI_MAX_TOKENS }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
          ADMIN_PASSWORD_HASH: ${{ secrets.ADMIN_PASSWORD_HASH }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_WEBHOOK_SECRET: ${{ secrets.TELEGRAM_WEBHOOK_SECRET }}
          DOMAIN: ${{ secrets.DOMAIN }}
          DUCKDNS_TOKEN: ${{ secrets.DUCKDNS_TOKEN }}
          DUCKDNS_SUBDOMAIN: ${{ secrets.DUCKDNS_SUBDOMAIN }}
          TZ: ${{ secrets.TZ }}
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
          JOB_SEARCH_INTERVAL_MINUTES: ${{ secrets.JOB_SEARCH_INTERVAL_MINUTES }}
          JOB_SEARCH_MAX_CVS: ${{ secrets.JOB_SEARCH_MAX_CVS }}
          JOOBLE_API_KEY: ${{ secrets.JOOBLE_API_KEY }}
        run: |
          set -e
          umask 077
          mkdir -p out
          {
            echo "OPENAI_API_KEY=${OPENAI_API_KEY}"
            echo "OPENAI_BASE_URL=${OPENAI_BASE_URL}"
            echo "OPENAI_MODEL=${OPENAI_MODEL}"
            echo "OPENAI_TEMPERATURE=${OPENAI_TEMPERATURE:-0.7}"
            echo "OPENAI_MAX_TOKENS=${OPENAI_MAX_TOKENS:-4096}"
            echo "JWT_SECRET=${JWT_SECRET}"
            echo "ADMIN_USERNAME=${ADMIN_USERNAME:-admin}"
            echo "ADMIN_PASSWORD_HASH=${ADMIN_PASSWORD_HASH}"
            echo "TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}"
            echo "TELEGRAM_WEBHOOK_SECRET=${TELEGRAM_WEBHOOK_SECRET}"
            echo "PRODUCTION=true"
            echo "ADZUNA_APP_ID=${ADZUNA_APP_ID}"
            echo "ADZUNA_APP_KEY=${ADZUNA_APP_KEY}"
            echo "JOB_SEARCH_INTERVAL_MINUTES=${JOB_SEARCH_INTERVAL_MINUTES:-120}"
            echo "JOB_SEARCH_MAX_CVS=${JOB_SEARCH_MAX_CVS:-3}"
            echo "JOOBLE_API_KEY=${JOOBLE_API_KEY}"
          } > out/app.env
          {
            echo "DOMAIN=${DOMAIN}"
            echo "DUCKDNS_TOKEN=${DUCKDNS_TOKEN}"
            echo "DUCKDNS_SUBDOMAIN=${DUCKDNS_SUBDOMAIN}"
            echo "TZ=${TZ:-Etc/UTC}"
          } > out/deploy.env

      - name: Configure SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H ${{ secrets.ORACLE_HOST }} >> ~/.ssh/known_hosts

      - name: Sync deploy files + env to server
        run: |
          ssh -i ~/.ssh/id_deploy ubuntu@${{ secrets.ORACLE_HOST }} 'mkdir -p ~/ai-demo/deploy/oracle ~/ai-demo/samples ~/ai-demo/photos ~/ai-demo/output'
          scp -i ~/.ssh/id_deploy deploy/oracle/docker-compose.yml ubuntu@${{ secrets.ORACLE_HOST }}:~/ai-demo/deploy/oracle/docker-compose.yml
          scp -i ~/.ssh/id_deploy deploy/oracle/Caddyfile          ubuntu@${{ secrets.ORACLE_HOST }}:~/ai-demo/deploy/oracle/Caddyfile
          scp -i ~/.ssh/id_deploy out/app.env                       ubuntu@${{ secrets.ORACLE_HOST }}:~/ai-demo/.env
          scp -i ~/.ssh/id_deploy out/deploy.env                    ubuntu@${{ secrets.ORACLE_HOST }}:~/ai-demo/deploy/oracle/.env
          ssh -i ~/.ssh/id_deploy ubuntu@${{ secrets.ORACLE_HOST }} 'chmod 600 ~/ai-demo/.env ~/ai-demo/deploy/oracle/.env'

      - name: Pull & restart
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ubuntu
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd ~/ai-demo/deploy/oracle
            docker compose pull
            docker compose up -d

      - name: Health check
        run: |
          sleep 15
          curl -sf --retry 5 --retry-delay 5 "https://${{ secrets.DOMAIN }}/health" \
            || (echo "::error::health check failed — check Caddy logs / DuckDNS resolution"; exit 1)
